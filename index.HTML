<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalPath - Your Personalized Health Path</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #F5F7FA; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #3AB795; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .header p { color: #999; margin: 5px 0; }
        .header .date { color: #FF9500; font-weight: bold; }
        .meal-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .meal-icon { font-size: 32px; margin-right: 15px; min-width: 50px; text-align: center; }
        .meal-content { flex: 1; }
        .meal-type { font-weight: bold; font-size: 16px; color: #333; }
        .meal-name { color: #999; font-size: 14px; margin-top: 5px; }
        .meal-check { font-size: 20px; color: #3AB795; }
        .activity-section { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; border-top: 1px solid #eee; margin: 20px 0; }
        .activity-icon { width: 50px; height: 50px; border-radius: 50%; background-color: #E0F2F1; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }
        .activity-content h3 { font-weight: bold; color: #333; }
        .activity-content p { color: #999; font-size: 14px; margin-top: 5px; }
        .orange-section { background-color: #F39237; border-radius: 20px; padding: 20px; text-align: center; color: white; margin: 30px 0; }
        .arrow-icon { font-size: 40px; margin-bottom: 10px; }
        .generate-btn { background-color: #3AB795; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; transition: background-color 0.3s ease; }
        .generate-btn:hover:not(:disabled) { background-color: #2a9970; }
        .generate-btn:disabled { background-color: #999; cursor: not-allowed; }
        .orange-section p { color: rgba(255, 255, 255, 0.7); font-size: 12px; margin-top: 10px; }
        .sync-btn { background-color: #3AB795; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; transition: background-color 0.3s ease; }
        .sync-btn:hover { background-color: #2a9970; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .alert.show { display: block; }
        .alert.success { background-color: #4CAF50; color: white; }
        .alert.error { background-color: #f44336; color: white; }
        .alert.info { background-color: #2196F3; color: white; }
        .spinner-text { display: inline-block; margin-left: 10px; }
        @media (max-width: 600px) { .container { max-width: 100%; } .header h1 { font-size: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="alert" class="alert"></div>
        <div class="header">
            <h1>✔️ VitalPath</h1>
            <p>Welcome Back, {{ user_name }}!</p>
            <h2 style="font-size: 24px; font-weight: bold; margin: 10px 0;">Your Personalized Path</h2>
            <p class="date">{{ formatted_date }}</p>
        </div>
        <div id="meals-container">
            {% for meal in meals %}
            <div class="meal-card">
                <div class="meal-icon">{{ meal.icon }}</div>
                <div class="meal-content">
                    <div class="meal-type">{{ meal.type }}</div>
                    <div class="meal-name">{{ meal.name }}</div>
                </div>
                {% if meal.done %}<div class="meal-check">✓</div>{% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="activity-section">
            <div class="activity-icon">🏃</div>
            <div class="activity-content">
                <h3>Activity</h3>
                <p>{{ activity }}</p>
            </div>
        </div>
        <div class="orange-section">
            <div class="arrow-icon" id="arrow">⬇️</div>
            <button class="generate-btn" id="generateBtn" onclick="generateMeals()">GENERATE TOMORROW'S MEALS</button>
            <p>Stay ahead of hunger, the easy way.</p>
        </div>
        <button class="sync-btn" onclick="syncToDatabase(event)">☁️ Sync to Firebase</button>
    </div>
    <script>
        function getLocation() {
            return new Promise((resolve, reject) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => { resolve({ latitude: position.coords.latitude, longitude: position.coords.longitude }); },
                        (error) => { console.warn('Geolocation error:', error); resolve(null); }
                    );
                } else { resolve(null); }
            });
        }
        async function generateMeals() {
            const generateBtn = document.getElementById('generateBtn');
            const arrow = document.getElementById('arrow');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="loading-spinner"></div><span class="spinner-text">Generating...</span>';
            arrow.textContent = '⏳';
            try {
                const location = await getLocation();
                const response = await fetch('/api/generate-meals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ latitude: location ? location.latitude : null, longitude: location ? location.longitude : null })
                });
                const data = await response.json();
                if (data.success) { updateMealsDisplay(data.meals); showAlert(data.message, 'info'); }
                else { showAlert('❌ ' + data.message, 'error'); }
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ Error generating meals: ' + error.message, 'error');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = 'GENERATE TOMORROW\'S MEALS';
                arrow.textContent = '⬇️';
            }
        }
        async function syncToDatabase(event) {
            const syncBtn = event.target;
            syncBtn.disabled = true;
            syncBtn.textContent = '☁️ Syncing...';
            try {
                const mealsElement = document.getElementById('meals-container');
                const mealCards = mealsElement.querySelectorAll('.meal-card');
                const meals = Array.from(mealCards).map(card => ({
                    name: card.querySelector('.meal-name').textContent,
                    type: card.querySelector('.meal-type').textContent,
                    done: card.querySelector('.meal-check') !== null,
                    icon: card.querySelector('.meal-icon').textContent
                }));
                const response = await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ meals: meals })
                });
                const data = await response.json();
                if (data.success) { showAlert(data.message, 'success'); }
                else { showAlert(data.message, 'error'); }
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ Error syncing: ' + error.message, 'error');
            } finally {
                syncBtn.disabled = false;
                syncBtn.textContent = '☁️ Sync to Firebase';
            }
        }
        function updateMealsDisplay(meals) {
            const container = document.getElementById('meals-container');
            container.innerHTML = '';
            meals.forEach(meal => {
                const mealCard = document.createElement('div');
                mealCard.className = 'meal-card';
                mealCard.innerHTML = `<div class="meal-icon">${meal.icon}</div><div class="meal-cont
